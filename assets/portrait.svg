<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a2522"/>
      <stop offset="100%" stop-color="#121010"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <g stroke="#cfc7b8" stroke-width="2.2" fill="none" opacity="0.9">
    <!-- bandana / head -->
    <path d="M180,300 C150,180 220,90 300,90 C380,90 450,180 420,300"/>
    <path d="M180,300 C150,180 220,90 300,90 C380,90 450,180 420,300" fill="#4a423b" fill-opacity="0.35"/>
    <!-- bandana wrap -->
    <path d="M176,150 C240,120 360,120 424,150" stroke="#c9a24b"/>
    <path d="M200,118 l-12,-26 M250,100 l-6,-30 M350,100 l6,-30 M400,118 l12,-26" stroke="#c9a24b" opacity="0.6"/>
