    <!-- smoke wisps -->
    <path d="M470,360 C520,330 500,280 540,260" opacity="0.4" stroke="#c9a24b"/>
    <path d="M130,360 C80,330 100,280 60,260" opacity="0.4" stroke="#c9a24b"/>
  </g>
</svg>
