    <path d="M232,250 q34,-26 64,0" />
    <path d="M308,250 q34,-26 64,0" />
    <circle cx="262" cy="262" r="9" fill="#cfc7b8"/>
    <circle cx="338" cy="262" r="9" fill="#cfc7b8"/>
    <!-- nose + lips -->
    <path d="M300,270 l-10,70 q10,16 24,4"/>
    <path d="M268,372 q32,22 64,0"/>
    <!-- jaw / neck -->
    <path d="M196,300 C190,430 240,520 300,520 C360,520 410,430 404,300"/>
    <path d="M250,520 l-6,90 M350,520 l6,90"/>
    <!-- shoulders -->
